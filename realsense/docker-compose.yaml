services:
  realsense_node:
    build:
      context: .
      args:
        USER_ID: ${HOST_UID:-1000}
        GROUP_ID: ${HOST_GID:-1000}
    image: realsense-iox2:latest

    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all

    devices:
      - /dev/rs0-rgb:/dev/rs0-rgb
      - /dev/video2:/dev/video2

    volumes:
      - /dev/shm:/dev/shm
      - /tmp:/tmp

    ipc: host

    restart: unless-stopped
